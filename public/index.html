<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AirShare</title>

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">

    <meta name="theme-color" content="#FFF8F3">

    <!-- Real QR Code Generator -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body>

<header>

    <div class="logo">

        <img src="favicon.svg" alt="AirShare Logo">

        <div class="logo-text">
            <h1 id="app-title">AirShare</h1>
            <span>Fast • Private • Local</span>
        </div>

    </div>

    <div class="header-actions">

        <div id="my-identity">
            <span class="status-dot green"></span>
            <span id="my-name">Connecting...</span>
        </div>

        <button
                id="btn-qr"
                class="btn-primary"
                aria-label="Share Network">
            📱 Invite Device
        </button>

    </div>

</header>

<main>

    <section class="hero">

        <h2>
            Nearby Devices
            <span id="user-count">0</span>
        </h2>

        <p class="subtitle">
            Click a device or drag & drop files directly onto it.
        </p>

    </section>

    <section
            id="drop-zone"
            class="drop-zone">

        <div
                id="user-grid"
                class="user-grid">
        </div>

    </section>

</main>

<!-- Transfers -->

<div
        id="transfer-overlay"
        class="hidden">

    <div class="transfer-header">

        <h3>
            📤 Transfers
        </h3>

        <button
                id="btn-close-transfers"
                aria-label="Close">
            ✕
        </button>

    </div>

    <div id="transfer-list"></div>

</div>

<!-- Backdrop -->

<div
        id="modal-backdrop"
        class="hidden">
</div>

<!-- Incoming transfer -->

<div
        id="modal-request"
        class="modal hidden">

    <h3>
        Incoming File
    </h3>

    <p id="request-info"></p>

    <div class="modal-actions">

        <button
                id="btn-decline"
                class="btn-danger">
            Decline
        </button>

        <button
                id="btn-accept"
                class="btn-primary">
            Accept
        </button>

    </div>

</div>

<!-- QR -->

<div
        id="modal-qr"
        class="modal hidden">

    <h3>
        Invite another device
    </h3>

    <div id="qr-container"></div>

    <p class="subtitle">
        Scan this QR code on another device connected to the same network.
    </p>

    <div class="modal-actions">

        <button
                id="btn-close-qr"
                class="btn-primary">
            Done
        </button>

    </div>

</div>

<!-- Toasts -->

<div id="toast-container"></div>

<!-- Hidden Inputs -->

<input
        type="file"
        id="file-input"
        multiple
        hidden>

<input
        type="file"
        id="folder-input"
        webkitdirectory
        hidden>

<script type="module" src="app.js"></script>

</body>
</html>
